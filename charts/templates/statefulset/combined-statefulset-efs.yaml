{{ $context := merge (dict "app" $.Values.combinedVideoProcessor) . }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "neves.name.app" $context }}
  namespace: {{ $.Values.teamName }}
  labels:
    # {{ include "neves.commonLabels" $context | nindent 4 }}
    tags.datadoghq.com/env: "prod"
    tags.datadoghq.com/service: "combined-streaming"
    tags.datadoghq.com/version: "dec4261d2f1f0ecb1d1395f8bb7930f44bb0462c"
    app.kubernetes.io/name: {{ .Values.teamName | quote}}
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" | quote}}
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/part-of: {{ .Chart.Name | quote }}
    app: {{ include "neves.name.app" $context | quote }}
spec:
  selector:
    matchLabels:
      app: {{ include "neves.name.app" $context }}

  serviceName: {{ include "neves.name.app" $context }}-headless

  template:
    metadata:
      labels:
        # {{ include "neves.commonLabels" $context | nindent 8 }}
        tags.datadoghq.com/env: "prod"
        tags.datadoghq.com/service: "combined-streaming"
        tags.datadoghq.com/version: "dec4261d2f1f0ecb1d1395f8bb7930f44bb0462c"
        admission.datadoghq.com/enabled: "true"
        app.kubernetes.io/name: {{ .Values.teamName | quote}}
        helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" | quote}}
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
        app.kubernetes.io/part-of: {{ .Chart.Name | quote }}
        app: {{ include "neves.name.app" $context | quote }}
      annotations:
        admission.datadoghq.com/python-lib.version: v4.5.4
    spec:
      volumes:
        {{ $mediamtxContext := merge (dict "app" $.Values.combinedVideoProcessor.mediamtxContainer) . }}
        - name: mediamtx-config-volume
          configMap:
            name: {{ include "neves.name.configmap" $mediamtxContext }}
      
      containers:
        - name: {{ include "neves.name.container" $mediamtxContext }}
          image: {{ include "neves.url.image" $mediamtxContext }}
          env:
            - name: DD_PROFILING_ENABLED
              value: "true"
            - name: DD_LOGS_INJECTION
              value: "true"
            # - name: DD_ENV
            #   valueFrom:
            #     fieldRef:
            #       fieldPath: metadata.labels['tags.datadoghq.com/env']
            # - name: DD_SERVICE
            #   valueFrom:
            #     fieldRef:
            #       fieldPath: metadata.labels['tags.datadoghq.com/service']
            # - name: DD_VERSION
            #   valueFrom:
            #     fieldRef:
            #       fieldPath: metadata.labels['tags.datadoghq.com/version']
          
          ports:
            {{ range $port := $context.app.mediamtxContainer.containerPorts }}
            - containerPort: {{ $port.containerPort }}
              protocol: {{ $port.protocol }}
              name: {{ $port.name }}
             {{ end }}

          resources:
            requests:
              memory: {{ $mediamtxContext.app.resources.requests.memory }}
              cpu: {{ $mediamtxContext.app.resources.requests.cpu }}
            limits:
              memory: {{ $mediamtxContext.app.resources.limits.memory }}
              cpu: {{ $mediamtxContext.app.resources.limits.cpu }}

          volumeMounts:
            - name: {{ $context.app.volumeClaimTemplate.name }}
              mountPath: {{ $context.app.mediamtxContainer.storageMountPath }}
            - name: mediamtx-config-volume
              mountPath: {{ $context.app.mediamtxContainer.configMountPath }}
              subPath: {{ $context.app.mediamtxContainer.configSubPath }}
        
      {{ $dbUploadContext := merge (dict "app" $.Values.combinedVideoProcessor.dbUploadContainer) . }}
        - name: {{ include "neves.name.container" $dbUploadContext }}
          image: {{ include "neves.url.image" $dbUploadContext }}
          env:
            - name: DD_PROFILING_ENABLED
              value: "true"
            - name: DD_LOGS_INJECTION
              value: "true"
            # - name: DD_ENV
            #   valueFrom:
            #     fieldRef:
            #       fieldPath: metadata.labels['tags.datadoghq.com/env']
            # - name: DD_SERVICE
            #   valueFrom:
            #     fieldRef:
            #       fieldPath: metadata.labels['tags.datadoghq.com/service']
            # - name: DD_VERSION
            #   valueFrom:
            #     fieldRef:
            #       fieldPath: metadata.labels['tags.datadoghq.com/version']
          envFrom:
            - configMapRef:
                name: {{ include "neves.name.configmap" $dbUploadContext }}
            - secretRef:
                name: {{ include "neves.name.secret" $dbUploadContext }}
          ports:
          {{- range $port := $context.app.ports }}
            - name: {{ $port.name }}
              containerPort: {{ $port.containerPort }}
              protocol: {{ $port.protocol }}
          {{- end }}

          resources:
            requests:
              memory: {{ $dbUploadContext.app.resources.requests.memory }}
              cpu: {{ $dbUploadContext.app.resources.requests.cpu }}
            limits:
              memory: {{ $dbUploadContext.app.resources.limits.memory }}
              cpu: {{ $dbUploadContext.app.resources.limits.cpu }}

          volumeMounts:
            - name: {{ $context.app.volumeClaimTemplate.name }}
              mountPath: {{ $context.app.dbUploadContainer.storageMountPath }}

  volumeClaimTemplates:
  - metadata:
      name: {{ $context.app.volumeClaimTemplate.name }}
    spec:
      accessModes: {{ $context.app.volumeClaimTemplate.accessModes }}
      storageClassName: {{ $.Values.ebsStorageClass.name }}
      resources:
        requests:
          storage: {{ $context.app.volumeClaimTemplate.storage }}

